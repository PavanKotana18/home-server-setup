<svg width="1000" height="560" viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="lan-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="vpn-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="srv-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="grn-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1000" height="560" rx="16" fill="#ffffff" stroke="#e8e6de" stroke-width="1"/>

  <!-- Title -->
  <rect x="0" y="0" width="1000" height="54" rx="16" fill="#1a1a1a"/>
  <rect x="0" y="38" width="1000" height="16" fill="#1a1a1a"/>
  <text x="500" y="24" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="16" font-weight="700" fill="#ffffff" dominant-baseline="central">Request Lifecycle — LAN Path vs VPN Path</text>
  <text x="500" y="46" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#9ca3af" dominant-baseline="central">How a request travels from your device to a service · Diagram 2 of 5</text>

  <!-- ── COLUMN HEADERS ── -->
  <!-- cols: Actor(0-140) | Internet(140-280) | Router(280-420) | Server(420-560) | Docker(560-700) | Service(700-860) | Result(860-1000) -->
  <rect x="0" y="54" width="1000" height="30" fill="#F1EFE8"/>
  <line x1="140" y1="54" x2="140" y2="530" stroke="#e8e6de" stroke-width="1"/>
  <line x1="280" y1="54" x2="280" y2="530" stroke="#e8e6de" stroke-width="1"/>
  <line x1="420" y1="54" x2="420" y2="530" stroke="#e8e6de" stroke-width="1"/>
  <line x1="560" y1="54" x2="560" y2="530" stroke="#e8e6de" stroke-width="1"/>
  <line x1="700" y1="54" x2="700" y2="530" stroke="#e8e6de" stroke-width="1"/>
  <line x1="860" y1="54" x2="860" y2="530" stroke="#e8e6de" stroke-width="1"/>
  <text x="70"  y="69" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#5F5E5A" dominant-baseline="central" letter-spacing="0.5">ACTOR</text>
  <text x="210" y="69" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#5F5E5A" dominant-baseline="central" letter-spacing="0.5">INTERNET</text>
  <text x="350" y="69" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#5F5E5A" dominant-baseline="central" letter-spacing="0.5">ROUTER</text>
  <text x="490" y="69" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#5F5E5A" dominant-baseline="central" letter-spacing="0.5">HOME SERVER</text>
  <text x="630" y="69" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#5F5E5A" dominant-baseline="central" letter-spacing="0.5">DOCKER</text>
  <text x="780" y="69" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#5F5E5A" dominant-baseline="central" letter-spacing="0.5">SERVICE</text>
  <text x="930" y="69" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" font-weight="700" fill="#5F5E5A" dominant-baseline="central" letter-spacing="0.5">RESPONSE</text>

  <!-- ════ LANE 1 — LAN  y=84→244 ════ -->
  <rect x="0"   y="84" width="140" height="160" fill="#e8faf2"/>
  <rect x="140" y="84" width="860" height="160" fill="#f6fdf9"/>
  <rect x="0"   y="84" width="5"   height="160" fill="#0F6E56"/>
  <text x="70" y="164" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#085041" dominant-baseline="central" transform="rotate(-90,70,164)">LAN ACCESS</text>
  <line x1="0" y1="244" x2="1000" y2="244" stroke="#c0e8d4" stroke-width="1"/>

  <!-- LAN: Device node -->
  <rect x="16" y="118" width="108" height="52" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="70" y="138" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#374141" dominant-baseline="central">Device</text>
  <text x="70" y="156" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#5F5E5A" dominant-baseline="central">Laptop/TV/Phone</text>

  <!-- LAN: skips internet col — dashed bypass -->
  <line x1="124" y1="144" x2="156" y2="144" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="210" y="108" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#1D9E75" font-style="italic">no internet hop</text>
  <line x1="156" y1="144" x2="280" y2="144" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- LAN: Router node -->
  <rect x="292" y="118" width="116" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="350" y="138" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#085041" dominant-baseline="central">Router</text>
  <text x="350" y="156" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#0F6E56" dominant-baseline="central">192.168.x.x</text>

  <line x1="408" y1="144" x2="432" y2="144" stroke="#0F6E56" stroke-width="2" marker-end="url(#lan-arr)"/>

  <!-- LAN: Server node -->
  <rect x="432" y="118" width="116" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="490" y="138" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#3C3489" dominant-baseline="central">Home server</text>
  <text x="490" y="156" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#534AB7" dominant-baseline="central">Ubuntu + Docker</text>

  <line x1="548" y1="144" x2="572" y2="144" stroke="#534AB7" stroke-width="2" marker-end="url(#srv-arr)"/>

  <!-- LAN: Docker node -->
  <rect x="572" y="118" width="116" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="630" y="138" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#3C3489" dominant-baseline="central">Docker</text>
  <text x="630" y="156" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#534AB7" dominant-baseline="central">Container engine</text>

  <line x1="688" y1="144" x2="712" y2="144" stroke="#534AB7" stroke-width="2" marker-end="url(#srv-arr)"/>

  <!-- LAN: Service node -->
  <rect x="712" y="118" width="136" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="780" y="138" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#085041" dominant-baseline="central">Service</text>
  <text x="780" y="156" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#0F6E56" dominant-baseline="central">Jellyfin / Nextcloud…</text>

  <line x1="848" y1="144" x2="872" y2="144" stroke="#3B6D11" stroke-width="2" marker-end="url(#grn-arr)"/>

  <!-- LAN: Response node -->
  <rect x="872" y="118" width="112" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="928" y="138" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#27500A" dominant-baseline="central">Response</text>
  <text x="928" y="156" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#3B6D11" dominant-baseline="central">Data returned</text>

  <!-- LAN step labels -->
  <text x="290" y="204" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#1D9E75">① LAN packet sent</text>
  <text x="432" y="204" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#1D9E75">② routed to server</text>
  <text x="572" y="204" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#1D9E75">③ container handles</text>
  <text x="712" y="204" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#1D9E75">④ response sent back</text>

  <!-- ════ LANE 2 — VPN  y=244→440 ════ -->
  <rect x="0"   y="244" width="140" height="196" fill="#faeae4"/>
  <rect x="140" y="244" width="860" height="196" fill="#fdf5f2"/>
  <rect x="0"   y="244" width="5"   height="196" fill="#993C1D"/>
  <text x="70" y="342" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#712B13" dominant-baseline="central" transform="rotate(-90,70,342)">VPN REMOTE</text>
  <line x1="0" y1="440" x2="1000" y2="440" stroke="#f5c4b3" stroke-width="1"/>

  <!-- VPN: Remote device -->
  <rect x="16" y="272" width="108" height="52" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="70" y="292" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#374141" dominant-baseline="central">Remote device</text>
  <text x="70" y="310" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#5F5E5A" dominant-baseline="central">Phone / Laptop</text>

  <!-- Device → Internet -->
  <line x1="124" y1="298" x2="152" y2="298" stroke="#993C1D" stroke-width="2" marker-end="url(#vpn-arr)"/>

  <!-- Internet node -->
  <rect x="152" y="272" width="116" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="210" y="292" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#0C447C" dominant-baseline="central">Internet</text>
  <text x="210" y="310" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#185FA5" dominant-baseline="central">Public WAN</text>

  <!-- Internet → WireGuard (L-bend down) -->
  <path d="M 210 324 L 210 376 L 280 376" fill="none" stroke="#993C1D" stroke-width="2" marker-end="url(#vpn-arr)"/>

  <!-- WireGuard node spans col 2+3 -->
  <rect x="280" y="356" width="232" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.75"/>
  <text x="396" y="376" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#712B13" dominant-baseline="central">WireGuard VPN</text>
  <text x="396" y="394" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#993C1D" dominant-baseline="central">Encrypted tunnel · UDP 51820</text>

  <!-- Router node (VPN lane) -->
  <rect x="292" y="272" width="116" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="350" y="292" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#085041" dominant-baseline="central">Router</text>
  <text x="350" y="310" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#0F6E56" dominant-baseline="central">port-forwards VPN</text>

  <!-- WireGuard → Server (L-bend up+right) -->
  <path d="M 512 382 L 560 382 L 560 298 L 572 298" fill="none" stroke="#993C1D" stroke-width="2" marker-end="url(#vpn-arr)"/>

  <!-- Server node (VPN lane) -->
  <rect x="432" y="272" width="116" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="490" y="292" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#3C3489" dominant-baseline="central">Home server</text>
  <text x="490" y="310" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#534AB7" dominant-baseline="central">decrypts tunnel</text>

  <!-- Server → Docker -->
  <line x1="548" y1="298" x2="572" y2="298" stroke="#534AB7" stroke-width="2" marker-end="url(#srv-arr)"/>

  <!-- Docker node (VPN lane) -->
  <rect x="572" y="272" width="116" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="630" y="292" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#3C3489" dominant-baseline="central">Docker</text>
  <text x="630" y="310" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#534AB7" dominant-baseline="central">same services</text>

  <!-- Docker → Service -->
  <line x1="688" y1="298" x2="712" y2="298" stroke="#534AB7" stroke-width="2" marker-end="url(#srv-arr)"/>

  <!-- Service (VPN lane) -->
  <rect x="712" y="272" width="136" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="780" y="292" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#085041" dominant-baseline="central">Service</text>
  <text x="780" y="310" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#0F6E56" dominant-baseline="central">identical to LAN</text>

  <!-- VPN step labels -->
  <text x="152" y="420" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#993C1D">① encrypted over internet</text>
  <text x="340" y="420" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#993C1D">② WireGuard decrypts at server</text>
  <text x="572" y="420" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#993C1D">③ same Docker path</text>

  <!-- ════ CONVERGENCE BAR ════ -->
  <rect x="0" y="440" width="1000" height="56" fill="#EEEDFE"/>
  <rect x="0" y="440" width="5" height="56" fill="#534AB7"/>
  <text x="500" y="462" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#3C3489" dominant-baseline="central">Both paths reach the same Docker services — identical experience for LAN and VPN users</text>
  <text x="500" y="482" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#534AB7" dominant-baseline="central">LAN: plaintext over local network · VPN: AES-256 encrypted over internet, decrypted at WireGuard</text>

  <!-- ════ LEGEND ════ -->
  <line x1="20" y1="510" x2="1000" y2="510" stroke="#e8e6de" stroke-width="1"/>
  <line x1="30" y1="530" x2="60" y2="530" stroke="#1D9E75" stroke-width="2"/>
  <text x="66" y="534" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5F5E5A" dominant-baseline="central">LAN path (direct)</text>
  <line x1="200" y1="530" x2="230" y2="530" stroke="#993C1D" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="236" y="534" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5F5E5A" dominant-baseline="central">VPN path (encrypted)</text>
  <line x1="400" y1="530" x2="430" y2="530" stroke="#534AB7" stroke-width="2"/>
  <text x="436" y="534" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5F5E5A" dominant-baseline="central">Docker internal path</text>
  <line x1="600" y1="530" x2="630" y2="530" stroke="#3B6D11" stroke-width="2"/>
  <text x="636" y="534" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5F5E5A" dominant-baseline="central">Response returned</text>
</svg>
